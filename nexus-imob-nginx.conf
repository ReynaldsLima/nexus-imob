# ============================================================
#  NEXUS IMOB — NGINX CONFIG
#  Proxy reverso para N8N e Evolution API
# ============================================================

# nginx/conf.d/nexus.conf

# ----------------------------------------------------------
# N8N — https://n8n.seudominio.com.br
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name n8n.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Cloudflare IPs apenas (segurança extra)
    # include /etc/nginx/cloudflare-ips.conf;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

# ----------------------------------------------------------
# EVOLUTION API — https://wpp.seudominio.com.br
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name wpp.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://evolution-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}

# ----------------------------------------------------------
# Redirect HTTP → HTTPS
# ----------------------------------------------------------
server {
    listen 80;
    server_name *.${DOMAIN};
    return 301 https://$host$request_uri;
}
