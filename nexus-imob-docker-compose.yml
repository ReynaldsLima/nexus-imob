# ============================================================
#  NEXUS IMOB — DOCKER COMPOSE
#  VPS Principal: N8N + Evolution API + PostgreSQL + Redis
#  Versão: 1.0 | Março 2026
#
#  ESTRUTURA DE SERVIÇOS:
#  ├── nginx          → Proxy reverso + SSL (Cloudflare)
#  ├── n8n            → Motor de automação
#  ├── evolution-api  → WhatsApp (multi-instância)
#  ├── postgres       → Banco de dados (multi-tenant)
#  ├── redis          → Cache + filas + sessões
#  └── pgadmin        → Admin do banco (opcional)
# ============================================================

version: "3.9"

# ============================================================
# NETWORKS
# ============================================================
networks:
  nexus-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================
# VOLUMES PERSISTENTES
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  evolution_data:
    driver: local
  nginx_certs:
    driver: local
  imoveis_fotos:
    driver: local

# ============================================================
# SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # NGINX — Proxy reverso + SSL termination
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/html:ro
    networks:
      - nexus-internal
    depends_on:
      - n8n
      - evolution-api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.nexus.service=nginx"
      - "com.nexus.description=Reverse proxy and SSL termination"

  # ----------------------------------------------------------
  # POSTGRESQL — Banco multi-tenant
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-nexus_imob}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro   # scripts de inicialização
      - ./postgres/backups:/backups
    networks:
      - nexus-internal
    ports:
      - "127.0.0.1:5432:5432"                            # apenas localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_imob}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c log_min_duration_statement=500
    labels:
      - "com.nexus.service=postgres"
      - "com.nexus.description=Multi-tenant PostgreSQL with pgvector"

  # ----------------------------------------------------------
  # REDIS — Cache, sessões e filas
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - nexus-internal
    ports:
      - "127.0.0.1:6379:6379"                            # apenas localhost
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.nexus.service=redis"
      - "com.nexus.description=Cache, sessions and message queues"

  # ----------------------------------------------------------
  # N8N — Motor de automação
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n
    restart: unless-stopped
    environment:
      # Banco de dados
      DB_TYPE:                    postgresdb
      DB_POSTGRESDB_HOST:         postgres
      DB_POSTGRESDB_PORT:         5432
      DB_POSTGRESDB_DATABASE:     ${POSTGRES_DB:-nexus_imob}
      DB_POSTGRESDB_USER:         ${POSTGRES_USER:-nexus}
      DB_POSTGRESDB_PASSWORD:     ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA:       n8n

      # Redis para filas
      QUEUE_BULL_REDIS_HOST:      redis
      QUEUE_BULL_REDIS_PORT:      6379
      QUEUE_BULL_REDIS_PASSWORD:  ${REDIS_PASSWORD}
      EXECUTIONS_MODE:            queue

      # Segurança
      N8N_BASIC_AUTH_ACTIVE:      "true"
      N8N_BASIC_AUTH_USER:        ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:    ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY:         ${N8N_ENCRYPTION_KEY}

      # URLs
      WEBHOOK_URL:                https://n8n.${DOMAIN}
      N8N_HOST:                   n8n.${DOMAIN}
      N8N_PROTOCOL:               https
      N8N_PORT:                   5678

      # Timezone
      GENERIC_TIMEZONE:           America/Sao_Paulo
      TZ:                         America/Sao_Paulo

      # Execuções
      EXECUTIONS_DATA_SAVE_ON_ERROR:       all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS:     last
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      EXECUTIONS_DATA_PRUNE:               "true"
      EXECUTIONS_DATA_MAX_AGE:             336           # 14 dias em horas

      # IA / LLM
      N8N_AI_ENABLED:             "true"

      # Logs
      N8N_LOG_LEVEL:              info
      N8N_LOG_OUTPUT:             console

    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro    # workflows exportados
    networks:
      - nexus-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "com.nexus.service=n8n"
      - "com.nexus.description=Automation engine"

  # ----------------------------------------------------------
  # N8N WORKER — Processa filas em paralelo
  # ----------------------------------------------------------
  n8n-worker:
    image: n8nio/n8n:latest
    container_name: nexus-n8n-worker
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE:                    postgresdb
      DB_POSTGRESDB_HOST:         postgres
      DB_POSTGRESDB_PORT:         5432
      DB_POSTGRESDB_DATABASE:     ${POSTGRES_DB:-nexus_imob}
      DB_POSTGRESDB_USER:         ${POSTGRES_USER:-nexus}
      DB_POSTGRESDB_PASSWORD:     ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA:       n8n
      QUEUE_BULL_REDIS_HOST:      redis
      QUEUE_BULL_REDIS_PORT:      6379
      QUEUE_BULL_REDIS_PASSWORD:  ${REDIS_PASSWORD}
      EXECUTIONS_MODE:            queue
      N8N_ENCRYPTION_KEY:         ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE:           America/Sao_Paulo
      TZ:                         America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - nexus-internal
    depends_on:
      - n8n
    deploy:
      replicas: 2                                        # 2 workers em paralelo
    labels:
      - "com.nexus.service=n8n-worker"
      - "com.nexus.description=N8N queue worker"

  # ----------------------------------------------------------
  # EVOLUTION API — WhatsApp multi-instância
  # ----------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: nexus-evolution
    restart: unless-stopped
    environment:
      # Servidor
      SERVER_URL:                 https://wpp.${DOMAIN}
      AUTHENTICATION_API_KEY:     ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Banco de dados
      DATABASE_ENABLED:           "true"
      DATABASE_PROVIDER:          postgresql
      DATABASE_CONNECTION_URI:    postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_imob}?schema=evolution

      # Redis
      CACHE_REDIS_ENABLED:        "true"
      CACHE_REDIS_URI:            redis://:${REDIS_PASSWORD}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY:     evolution
      CACHE_REDIS_TTL:            604800

      # Webhook global (N8N recebe todos os eventos)
      WEBHOOK_GLOBAL_URL:         https://n8n.${DOMAIN}/webhook/evolution-global
      WEBHOOK_GLOBAL_ENABLED:     "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT:   "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED:    "true"

      # Mídia
      STORE_MESSAGES:             "true"
      STORE_MESSAGE_UP:           "true"
      STORE_CONTACTS:             "true"
      STORE_CHATS:                "true"

      # Timezone
      TZ:                         America/Sao_Paulo

      # Logs
      LOG_LEVEL:                  ERROR,WARN,INFO

    volumes:
      - evolution_data:/evolution/instances
    networks:
      - nexus-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "com.nexus.service=evolution-api"
      - "com.nexus.description=WhatsApp multi-instance manager"

  # ----------------------------------------------------------
  # BACKUP — pg_dump automático diário
  # ----------------------------------------------------------
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: nexus-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST:      postgres
      POSTGRES_DB:        ${POSTGRES_DB:-nexus_imob}
      POSTGRES_USER:      ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
      SCHEDULE:           "@daily"
      BACKUP_KEEP_DAYS:   7
      BACKUP_KEEP_WEEKS:  4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT:   8080
    volumes:
      - ./postgres/backups:/backups
    networks:
      - nexus-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "com.nexus.service=backup"
      - "com.nexus.description=Automated daily database backup"

  # ----------------------------------------------------------
  # PGADMIN — Interface admin do banco (opcional, dev only)
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@nexusimob.com.br}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_DISABLE_POSTFIX:  "true"
    networks:
      - nexus-internal
    depends_on:
      - postgres
    profiles:
      - dev                                              # apenas em modo dev
    labels:
      - "com.nexus.service=pgadmin"
      - "com.nexus.description=Database admin interface (dev only)"
